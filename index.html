<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Магазин услуг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 16px;
            padding-bottom: 80px;
            color: #1c1c1e;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .service-card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .service-info {
            flex: 2;
        }
        .service-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .service-desc {
            font-size: 14px;
            color: #6c6c70;
            margin-bottom: 8px;
        }
        .price {
            font-weight: 700;
            font-size: 20px;
            color: #007aff;
        }
        .buy-btn {
            background: #007aff;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .buy-btn:active {
            transform: scale(0.96);
        }
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e5e5ea;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }
        .checkout-btn {
            background: #34c759;
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 90px;
            left: 20px;
            right: 20px;
            background: #1c1c1e;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-size: 14px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            max-width: 300px;
            margin: 0 auto;
        }
        .toast.show {
            opacity: 1;
        }
        .empty-cart {
            text-align: center;
            color: #8e8e93;
            padding: 20px;
        }
        h2 {
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>✨ Наши услуги</h2>
    <div id="services-list"></div>
    <div id="cart-block"></div>
</div>

<div id="cart-bar" class="cart-bar" style="display: none;">
    <span>🛒 Итого: <span id="cart-total">0</span> ₽</span>
    <button id="checkout-button" class="checkout-btn">Оформить заказ</button>
</div>

<div id="toast-message" class="toast">✓ Добавлено</div>

<script>
    const services = [
        { id: 1, name: "Разработка сайта", description: "Landing page / визитка", price: 14900 },
        { id: 2, name: "Дизайн в Figma", description: "Интерфейс приложения", price: 8900 },
        { id: 3, name: "SEO продвижение", description: "Настройка и аудит", price: 19900 },
        { id: 4, name: "Telegram бот", description: "Под ключ", price: 12500 }
    ];

    let cart = [];

    function renderServices() {
        const container = document.getElementById('services-list');
        container.innerHTML = '';
        services.forEach(service => {
            const card = document.createElement('div');
            card.className = 'service-card';
            card.innerHTML = `
                <div class="service-info">
                    <div class="service-title">${service.name}</div>
                    <div class="service-desc">${service.description}</div>
                    <div class="price">${service.price.toLocaleString()} ₽</div>
                </div>
                <button class="buy-btn" data-id="${service.id}">Купить</button>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                addToCart(parseInt(btn.dataset.id));
            });
        });
    }

    function addToCart(id) {
        const existing = cart.find(item => item.id === id);
        if (existing) existing.quantity++;
        else cart.push({ id, quantity: 1 });
        updateCartUI();
        showToast('✓ Добавлено');
    }

    function removeFromCart(id) {
        cart = cart.filter(item => item.id !== id);
        updateCartUI();
        showToast('🗑 Удалено');
    }

    function getService(id) {
        return services.find(s => s.id === id);
    }

    function getTotal() {
        return cart.reduce((sum, item) => sum + getService(item.id).price * item.quantity, 0);
    }

    function updateCartUI() {
        const cartBlock = document.getElementById('cart-block');
        const cartBar = document.getElementById('cart-bar');
        const totalSpan = document.getElementById('cart-total');
        const total = getTotal();
        totalSpan.innerText = total.toLocaleString();

        if (cart.length === 0) {
            cartBar.style.display = 'none';
            cartBlock.innerHTML = '<div class="empty-cart">🛍 Корзина пуста</div>';
        } else {
            cartBar.style.display = 'flex';
            let html = `<div style="background:white;border-radius:24px;padding:12px 16px;margin-top:8px;">
                        <h3>🛒 Корзина</h3>`;
            cart.forEach(item => {
                const s = getService(item.id);
                html += `<div style="display:flex;justify-content:space-between;margin-top:12px;">
                            <div><strong>${s.name}</strong> × ${item.quantity}<br>${s.price.toLocaleString()} ₽</div>
                            <button class="remove-btn" data-id="${item.id}" style="background:#ff3b30;border:none;color:white;padding:6px 12px;border-radius:40px;">Удалить</button>
                        </div>`;
            });
            html += `<hr><div style="font-weight:700;">Итого: ${total.toLocaleString()} ₽</div></div>`;
            cartBlock.innerHTML = html;
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', () => removeFromCart(parseInt(btn.dataset.id)));
            });
        }
    }

    function checkout() {
        if (cart.length === 0) {
            showToast('Корзина пуста');
            return;
        }
        const order = {
            items: cart.map(item => ({ name: getService(item.id).name, quantity: item.quantity, price: getService(item.id).price })),
            total: getTotal(),
            date: new Date().toLocaleString()
        };
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.sendData(JSON.stringify(order));
            showToast('✅ Заказ отправлен!');
            setTimeout(() => Telegram.WebApp.close(), 1500);
        } else {
            alert('Заказ:\n' + JSON.stringify(order, null, 2));
            cart = [];
            updateCartUI();
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast-message');
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1500);
    }

    if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    }

    renderServices();
    updateCartUI();
    document.getElementById('checkout-button').onclick = checkout;
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
